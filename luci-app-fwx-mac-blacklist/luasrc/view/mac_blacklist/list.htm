<link rel="stylesheet" href="<%=resource%>/css/common.css">
<script src="<%=resource%>/common.js"></script>
<script type="text/javascript" src="<%=resource%>/jquery-3.7.1.min.js"></script>

<script type="text/javascript">
	let blacklist_data = { list: [] };

	function showMessage(message) {
		const $modal = $('#blacklist_message');
		$modal.find('p').text(message);
		$modal.css('display', 'flex');
		setTimeout(function() {
			$modal.css('display', 'none');
		}, 1200);
	}

	function loadBlacklist() {
		new XHR().get("<%=url('admin/fwx/get_mac_blacklist')%>", {}, function(x, data) {
			if (data && data.code === 0 && data.data && Array.isArray(data.data.list)) {
				blacklist_data.list = data.data.list;
			} else {
				blacklist_data.list = [];
			}
			renderBlacklist();
		});
	}

	function removeBlacklist(mac) {
		new XHR().post("<%=url('admin/fwx/del_mac_blacklist')%>", {mac: mac}, function(x, data) {
			if (data && data.code === 0) {
				showMessage('<%:Removed from blacklist%>');
				loadBlacklist();
			} else {
				showMessage('<%:Operation failed%>');
			}
		}, function() {
			showMessage('<%:Operation failed%>');
		});
	}

	function renderBlacklist() {
		const $tableBody = $('#blacklist_table_body');
		$tableBody.empty();

		if (!Array.isArray(blacklist_data.list) || blacklist_data.list.length === 0) {
			$tableBody.append('<tr><td colspan="4" style="text-align:center;padding:30px;color:#999;"><%:No blacklist entries yet%></td></tr>');
			return;
		}

		blacklist_data.list.forEach(function(item) {
			const mac = item.mac || '--';
			const hostname = item.hostname || '--';
			const remark = item.nickname || '--';
			const row = '' +
				'<tr>' +
				'<td style="font-family: monospace; font-weight: 600;">' + mac + '</td>' +
				'<td>' + hostname + '</td>' +
				'<td>' + remark + '</td>' +
				'<td><button type="button" class="cbi-button cbi-button-remove" onclick="removeBlacklist(\'' + mac + '\')"><%:Remove Blacklist%></button></td>' +
				'</tr>';
			$tableBody.append(row);
		});
	}

	window.onload = function() {
		loadBlacklist();
	};
</script>

<div class="cbi-section cbi-tblsection">
	<div style="padding: 5px 10px 20px;">
		<h3 style="margin: 0 0 16px 0;"><%:Internet Blacklist%></h3>
		<table class="common-table" style="width: 100%;">
			<thead>
				<tr>
					<th><%:MAC Address%></th>
					<th><%:Hostname%></th>
					<th><%:Remark%></th>
					<th style="width: 150px;"><%:Operation%></th>
				</tr>
			</thead>
			<tbody id="blacklist_table_body">
				<tr>
					<td colspan="4" style="text-align:center;padding:30px;color:#999;"><%:Loading...%></td>
				</tr>
			</tbody>
		</table>
	</div>
</div>

<div id="blacklist_message" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;">
	<div style="background-color:rgba(0,0,0,0.7);padding:20px 30px;border-radius:5px;color:#fff;text-align:center;">
		<p style="margin:0;"></p>
	</div>
</div>
